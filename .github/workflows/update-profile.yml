name: Refresh animated profile

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

concurrency:
  group: profile-art
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install renderer dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch contribution data
        env:
          GH_PROFILE_USER: Lemaxim23
        run: python scripts/fetch_contributions.py

      - name: Render animated SVG artwork
        env:
          GH_PROFILE_USER: Lemaxim23
        run: |
          python scripts/generate_heatmap_svg.py
          python scripts/generate_portrait_svg.py
          python scripts/generate_info_card.py

      - name: Commit refreshed artwork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets data/contributions.json
          if git diff --cached --quiet; then
            echo "Profile artwork is already current."
          else
            git commit -m "chore: refresh profile artwork [skip ci]"
            git push
          fi
